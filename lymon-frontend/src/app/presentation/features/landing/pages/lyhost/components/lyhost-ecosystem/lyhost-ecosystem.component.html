<section id="para-gestores" class="lyhost-ecosystem">
  <svg class="eco-grid" viewBox="0 0 100 100" preserveAspectRatio="none" aria-hidden="true">
    <defs>
      <pattern id="eco-grid-pattern" width="12" height="12" patternUnits="userSpaceOnUse">
        <path d="M 12 0 L 0 0 0 12" fill="none" stroke="var(--color-primary)" stroke-width="0.2"></path>
      </pattern>
    </defs>
    <rect width="100" height="100" fill="url(#eco-grid-pattern)"></rect>
  </svg>

  <div class="container ecosystem-inner">
    <div class="ecosystem-copy">
      <div class="section-chip"><span>ECOSISTEMA</span></div>
      <h2>
        Un centro de control<br />
        <span>para todo</span>
      </h2>
      <p>
        LyHost conecta todas tus plataformas de distribución en un solo punto.
        Sincronización bidireccional, sin conflictos, sin overbookings.
      </p>

      <div class="ecosystem-list">
        @for (item of checklistItems; track item) {
          <div class="ecosystem-item">
            <span class="ecosystem-check" aria-hidden="true">
              <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
                <path d="M2 5L4.5 7.5L8 3" stroke="var(--color-primary)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></path>
              </svg>
            </span>
            <span>{{ item }}</span>
          </div>
        }
      </div>
    </div>

    <div class="ecosystem-visual">
      <svg width="340" height="340" viewBox="0 0 340 340" fill="none" class="eco-orbit" aria-label="LyHost ecosystem animation">
        <defs>
          <linearGradient id="center-grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="var(--color-primary)"></stop>
            <stop offset="100%" stop-color="var(--color-primary-dark)"></stop>
          </linearGradient>
          <linearGradient id="node-grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="var(--color-primary)"></stop>
            <stop offset="100%" stop-color="var(--color-primary-dark)"></stop>
          </linearGradient>
        </defs>

        <circle [attr.cx]="cx" [attr.cy]="cy" [attr.r]="radius + 44" stroke="var(--color-primary)" stroke-opacity="0.05" stroke-width="1"></circle>
        <circle [attr.cx]="cx" [attr.cy]="cy" [attr.r]="radius" stroke="var(--color-primary)" stroke-opacity="0.14" stroke-width="1" stroke-dasharray="6 5"></circle>
        <circle [attr.cx]="cx" [attr.cy]="cy" [attr.r]="radius - 52" stroke="var(--color-border-light)" stroke-opacity="0.35" stroke-width="1"></circle>

        @for (node of nodes; track node.label) {
          <line
            [attr.x1]="cx"
            [attr.y1]="cy"
            [attr.x2]="node.x"
            [attr.y2]="node.y"
            stroke="var(--color-primary)"
            stroke-opacity="0.18"
            stroke-width="1.5"
            stroke-dasharray="5 5"
          ></line>
        }

        @for (node of nodes; track node.label) {
          @for (particle of node.particles; track $index) {
            <circle
              [attr.cx]="particle.x"
              [attr.cy]="particle.y"
              r="2.8"
              [attr.fill]="particle.color"
              [attr.opacity]="particle.opacity"
            ></circle>
          }
        }

        <circle class="pulse-ring pulse-ring-a" [attr.cx]="cx" [attr.cy]="cy" r="34" fill="none" stroke="var(--color-primary)" stroke-width="1.5"></circle>
        <circle class="pulse-ring pulse-ring-b" [attr.cx]="cx" [attr.cy]="cy" r="34" fill="none" stroke="var(--color-primary)" stroke-width="1"></circle>

        <circle [attr.cx]="cx" [attr.cy]="cy" r="44" fill="var(--color-primary)" fill-opacity="0.05"></circle>

        <g class="breathing-core">
          <circle [attr.cx]="cx" [attr.cy]="cy" r="34" fill="url(#center-grad)"></circle>
          <image
            href="images/LyHostLogo.svg"
            [attr.x]="cx - 22"
            [attr.y]="cy - 24"
            width="45"
            height="44"
            class="lyhost-core-logo"
            aria-hidden="true"
          ></image>
        </g>

        <text [attr.x]="cx" [attr.y]="cy + 52" text-anchor="middle" class="center-label">LyHost</text>

        @for (node of nodes; track node.label) {
          <g>
            <rect [attr.x]="node.x - 33" [attr.y]="node.y - 33" width="66" height="66" rx="15" fill="url(#node-grad)"></rect>
            <rect [attr.x]="node.x - 32" [attr.y]="node.y - 32" width="64" height="64" rx="14" fill="var(--color-bg-primary)"></rect>
            <circle [attr.cx]="node.x" [attr.cy]="node.y - 7" r="5" [attr.fill]="node.accent" fill-opacity="0.9"></circle>
            <text [attr.x]="node.x" [attr.y]="node.y + 13" text-anchor="middle" class="node-title">{{ node.label }}</text>
          </g>
        }
      </svg>
    </div>
  </div>
</section>
