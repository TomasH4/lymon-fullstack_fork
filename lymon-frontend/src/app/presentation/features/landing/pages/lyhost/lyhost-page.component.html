<div class="lyhost-page">
  <app-lyhost-nav></app-lyhost-nav>

  <main>
    <section
      #revealSection
      class="reveal-section"
      data-section-id="hero"
      [class.is-visible]="isVisible('hero')"
    >
      <app-lyhost-hero></app-lyhost-hero>
    </section>

    <section
      #revealSection
      class="reveal-section"
      data-section-id="plans"
      [class.is-visible]="isVisible('plans')"
    >
      <app-lyhost-plans></app-lyhost-plans>
    </section>

    <section
      #revealSection
      class="reveal-section"
      data-section-id="features"
      [class.is-visible]="isVisible('features')"
    >
      <app-lyhost-features></app-lyhost-features>
    </section>

    <section
      #revealSection
      class="reveal-section"
      data-section-id="ecosystem"
      [class.is-visible]="isVisible('ecosystem')"
    >
      <app-lyhost-ecosystem></app-lyhost-ecosystem>
    </section>
  </main>

  <app-footer></app-footer>
</div>
