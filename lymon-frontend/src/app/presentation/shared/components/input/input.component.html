@if (hasIcon()) {
  <div class="input-icon">
    <ng-content select="[icon]"></ng-content>
  </div>
}

<input
  #inputElement
  class="input-field"
  [type]="type()"
  [id]="id()"
  [name]="name()"
  [placeholder]="placeholder()"
  [disabled]="disabled()"
  [required]="required()"
  [readonly]="readonly()"
  [autocomplete]="autocomplete()"
  [value]="value()"
  (input)="onInputChange($event)"
  (focus)="onFocus()"
  (blur)="onBlur()"
/>
