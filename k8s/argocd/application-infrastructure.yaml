apiVersion: argoproj.io/v1beta1
kind: Application
metadata:
  name: lymon-infrastructure
  namespace: argocd
spec:
  project: lymon
  source:
    repoURL: "https://github.com/TomasH4/lymon-fullstack_fork.git"
    targetRevision: HEAD
    path: k8s/infra
  destination:
    server: "https://kubernetes.default.svc"
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
    - group: apps
      kind: StatefulSet
      jsonPointers:
        - /spec/replicas
